[build]
buildCommand = "npm run build"

[deploy]
startCommand = "sh -c 'export MEDUSA_DISABLE_TELEMETRY=true MEDUSA_WORKER_MODE=shared && node ./node_modules/@medusajs/cli/cli.js db:migrate && exec node ./node_modules/@medusajs/cli/cli.js start'"
healthcheckPath = "/health"
healthcheckTimeout = 600
restartPolicyType = "ON_FAILURE"
